version: "3.9"

# ─────────────────────────────────────────────────────────────────
# CloudSense — Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────

services:
  backend:
    # Use hot-reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - LOG_LEVEL=debug

  frontend:
    # Override: run Vite dev server instead of nginx
    build:
      context: ./frontend
      target: builder        # stop at builder stage, don't run nginx
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
